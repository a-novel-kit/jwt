name: release

# Releases are cut from the GitHub UI (Actions ▸ release ▸ pick a type ▸ Run),
# not from a tag push. workflow_call exposes the same inputs so an agent can
# drive an identical release later. The protected `release` environment is the
# "who can publish" gate (configure its required reviewers).
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version bump to cut
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: Bump & report only — no commit, tag, push, or release
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      release_type:
        required: true
        type: string
      dry_run:
        required: false
        type: boolean
        default: false

run-name: "🚀 release ${{ inputs.release_type }}${{ inputs.dry_run && ' (dry-run)' || '' }}"

# No concurrency lock, on purpose: two simultaneous releases compute the same
# tag, the first push wins, and the second fails on the atomic push before
# anything ships. A queue would instead let the second cut a second release.

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    outputs:
      version: ${{ steps.core.outputs.version }}
      tag: ${{ steps.core.outputs.tag }}
    steps:
      - id: core
        uses: a-novel-kit/workflows/publish-actions/release-core@v1.9.0
        with:
          release_type: ${{ inputs.release_type }}
          dry_run: ${{ inputs.dry_run }}
          client_id: ${{ vars.AGENT_BOT_CLIENT_ID }}
          app_private_key: ${{ secrets.AGENT_BOT_PRIVATE_KEY }}
      # Everything on the default branch just shipped — clear this repo's
      # awaiting-release items off the board. Skipped on a dry run.
      - if: ${{ !inputs.dry_run }}
        uses: a-novel-kit/workflows/generic-actions/archive-board-items@v1.9.0
        with:
          client_id: ${{ vars.AGENT_BOT_CLIENT_ID }}
          app_private_key: ${{ secrets.AGENT_BOT_PRIVATE_KEY }}
          project_id: ${{ github.repository_owner == 'a-novel' && 'PVT_kwDOB9MxdM4BMh8r' || 'PVT_kwDOCy-nAM4BbtKH' }}
