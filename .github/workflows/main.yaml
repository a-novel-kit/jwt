name: main

on:
  push:
    tags-ignore:
      - "**"
    branches:
      - "**"

jobs:
  test-go:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: a-novel-kit/workflows/go-actions/test-go@v1.26.1
        with:
          modfile: gotestsum.mod

  # A package that names a crypto.Hash without importing its registrar builds cleanly, passes every
  # test — a test binary links the hash packages through its own dependencies — and panics in a
  # consumer that imports the library alone. The check is structural because nothing inside the test
  # suite can observe the gap.
  lint-hash-registration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Every package naming a crypto.Hash imports its registrar
        shell: bash
        run: bash .github/scripts/lint-hash-registration.sh .

  lint-go:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: a-novel-kit/workflows/go-actions/lint-go@v1.26.1

  lint-js:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: a-novel-kit/workflows/node-actions/lint-node@v1.26.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          app_private_key: ${{ secrets.DEPENDENCY_BOT_PRIVATE_KEY }}
          client_id: ${{ vars.DEPENDENCY_BOT_CLIENT_ID }}

  lint-shell:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: a-novel-kit/workflows/generic-actions/lint-shell@v1.26.1
        with:
          # renovate: datasource=github-releases depName=koalaman/shellcheck
          version: "0.11.0"

  # Structural conventions golangci-lint cannot express.
  lint-semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: a-novel-kit/workflows/security-actions/lint-semgrep@v1.26.1
        with:
          ruleset: none
          # renovate: datasource=docker depName=semgrep/semgrep
          version: "1.171.0"

  # Replaces GitGuardian, which gated on a hosted service: when it saturated,
  # every PR in the fleet became unmergeable. This runs offline.
  scan-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: a-novel-kit/workflows/security-actions/scan-secrets@v1.26.1
        with:
          # renovate: datasource=github-releases depName=gitleaks/gitleaks
          version: "8.30.1"

  # Replaces CodeQL's actions analysis: excessive-permissions is the class it
  # reported as actions/missing-workflow-permissions.
  lint-workflows:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: a-novel-kit/workflows/security-actions/lint-workflows@v1.26.1
        with:
          # renovate: datasource=docker depName=ghcr.io/zizmorcore/zizmor
          version: "1.28.0"

  report-codecov:
    runs-on: ubuntu-latest
    needs: [test-go, lint-go]
    permissions:
      contents: read
    steps:
      - uses: a-novel-kit/workflows/generic-actions/codecov@v1.26.1
        with:
          codecov_token: ${{ secrets.CODECOV_TOKEN }}
          coverage_files: coverage.txt
          coverage_artifact_ids: ${{ needs.test.outputs.artifact-id }}
